<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha</title>
</head>
<body>
    <h2>Captcha</h2>
    <form>
    <label for="captcha">Enter Captcha: </label>
    <input type="text" id="captcha" placeholder="Enter Captcha...">
    <br>
    <br>
    <label>UserName:</label>
    <input type="text" placeholder="Enter Name..." id="un" name="username">
    <br>
    <br>
    <label>Email</label>
    <input type="email" name="email">
    <br>
    <br>
    <label>Password: <span style="color: red;">*</span> </label>
    <input type="Password" name=""pwd required>
    <br>
    <br>
    <label>Mobile :</label>
    <input type="tel">
    <br>
    <br>
    <label>Age:</label>
    <input type="number" min="1" max="150">
    <br>
    <br>
    <label>Date of Birth</label>
    <input type="Date">
    <br>
    <br>
    <label>Date of Birth with time:</label>
    <input type="datetime-local">
    <br>
    <br>
    <label>Profile url :</label>
    <input type="url">
    <br>
    <br>
    <label>other:</label>
    <input type="image" src="download.jpeg">
    <br>
    <br>
    <label>Upload PAN Card</label>
    <input type="file">
    <br>
    <br>
    <label>Rate out of 5:</label>
    <input type="range" min="1",max="5",name="HTML Rating" value="0">
    <br>
    <br>
    <label><input type="checkbox" name="opt1" value="cash">Cash</label>
    <label><input type="checkbox" name="opt2" value="upi">UPI</label>
    <label><input type="checkbox" name="opt2" value="rpay">RazorPay</label>
    <br>
    <br>
    <label>You allowed:</label>
    <input type="hidden">
    <br>
    <br>
    <input type="submit"> &nbsp; &nbsp; &nbsp; &nbsp;
    <button type="reset">Cancel</button> 
    <br>
    <br>
    
    
    </form>
</body>
</html>
