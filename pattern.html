<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h2>User Form</h2>
    <br>
    <br>
    <form>
        <label for="un">Name :</label>
        <input type="text" id="un" name="username" pattern="^[A-Z]{2,10}$" title ="Enter only Alphabets"
        placeholder="Asraf..." value="ABC">
        <button type="submit">Submit</button>
    </form>
</body>
</html>
